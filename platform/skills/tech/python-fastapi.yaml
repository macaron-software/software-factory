id: tech-python-fastapi
name: "Python / FastAPI"
stack: python-fastapi
description: "FastAPI + Pydantic v2 production patterns — async, testing, migrations"

content: |
  ## Run & Test
  uvicorn app.main:app --reload --port 8000   # dev
  pytest -x -v                                # tests (stop on first fail)
  ruff check . && ruff format .               # lint + format
  mypy .                                       # type check
  alembic upgrade head                        # run migrations

  ## App Structure
  app/
  ├── main.py          # FastAPI() + include_router
  ├── routers/         # APIRouter per domain
  ├── models/          # SQLAlchemy ORM models
  ├── schemas/         # Pydantic request/response schemas
  ├── services/        # business logic (no DB access)
  ├── repositories/    # DB access only
  └── dependencies.py  # Depends() factories

  ## Pydantic v2
  class Item(BaseModel):
      model_config = ConfigDict(from_attributes=True)
      id: int
      name: str
      price: float = Field(gt=0)
  - `model_validate(obj)` replaces `from_orm()`
  - `model_dump()` replaces `.dict()`
  - Validators: `@field_validator('name', mode='before')`

  ## Async Endpoints
  @router.post('/items', response_model=ItemResponse, status_code=201)
  async def create_item(body: ItemCreate, db: AsyncSession = Depends(get_db)):
      item = await item_service.create(db, body)
      return item
  - Always `async def` for endpoints doing I/O
  - `HTTPException(status_code=404, detail='Not found')`
  - Background tasks: `BackgroundTasks` param or Celery/ARQ

  ## SQLAlchemy 2.0 (async)
  async with async_session() as session:
      result = await session.execute(select(Item).where(Item.id == item_id))
      item = result.scalar_one_or_none()
  - `await session.commit()` + `await session.refresh(obj)` after insert
  - Migrations: `alembic revision --autogenerate -m "add items table"`

  ## Testing
  from httpx import AsyncClient
  @pytest.mark.anyio
  async def test_create_item(client: AsyncClient):
      resp = await client.post('/items', json={'name': 'x', 'price': 1.0})
      assert resp.status_code == 201
  - Fixture: `AsyncClient(app=app, base_url='http://test')` with lifespan
  - DB: override `get_db` dependency with test session
  - Factory: `pytest-factoryboy` or manual fixtures
