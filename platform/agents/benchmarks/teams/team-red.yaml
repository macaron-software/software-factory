team_id: team-red
technology: security
phase_type: development
description: Team team-red — end-to-end collaboration bench
pattern:
  type: sequential
  agents:
  - id: pentester-lead
  - id: exploit-dev
  - id: threat-analyst
task: Conduct a red team assessment of a web application login page. Enumerate attack vectors (SQL injection, brute force,
  credential stuffing, session hijacking), demonstrate exploitation steps, and rate each by severity.
checks:
- has_keyword:implement
- has_keyword:test
- length_min:300
expectations:
- Each agent contributes according to their role
- Output is coherent and addresses the full task
- Code or technical content is present where expected
