agent_id: rse-audit-social
technology: generic
phase_type: compliance
description: IT Social Auditor — Diversity & Inclusion — RSE, ethics, compliance analysis
eval_cases:
- id: compliance-audit
  input: 'Audit this feature for GDPR compliance: ''User analytics dashboard that tracks page views, clicks, time-on-page,
    and creates user behavior profiles for personalized recommendations. Data stored for 24 months. No explicit consent mechanism.'''
  checks:
  - has_keyword:consent
  - has_keyword:GDPR
  - has_keyword:retention
  - length_min:300
  expectations:
  - Identifies missing consent mechanism as critical violation
  - Questions 24-month retention period
  - Mentions right to erasure/portability
  - Provides remediation steps
