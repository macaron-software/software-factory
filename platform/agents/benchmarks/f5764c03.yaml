eval_cases:
- id: role-task
  input: 'As a worker, analyze this situation and provide your expert recommendation:


    A startup with 15 engineers is growing to 40 in 6 months. Current process: no formal code review, manual deployments,
    shared staging environment, Slack for all communication. What are the top 3 improvements you would recommend from your
    perspective as worker?'
