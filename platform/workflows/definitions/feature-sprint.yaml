id: feature-sprint
name: Feature Sprint — TDD Cycle
description: Workflow réutilisable pour chaque Feature d'un Epic. Design → TDD Sprint → Adversarial Review → E2E Tests → Deploy.
  Utilisé par chaque Feature Team dans le cadre d'un epic-decompose.
icon: repeat
is_builtin: true
pm_driven: true
on_complete:
  - workflow_id: documentation-pipeline
    condition: completed
  - workflow_id: knowledge-maintenance
    condition: completed
phases:
- id: feature-design
  pattern_id: sequential
  name: Feature Design
  description: >
    Lead + Archi analysent le brief et DÉCIDENT du workflow adapté.
    RÈGLE CRITIQUE — avant tout design, évaluer la complexité :
    • Si le brief décrit UNE fonction / UN endpoint / UN module simple (< 5 fichiers estimés)
      → continuer en feature-sprint normalement.
    • Si le brief décrit UN système complet (auth, API multi-routes, CRUD, microservice, etc.)
      → émettre exactement [ESCALATE: epic-decompose] dans la réponse pour basculer
        automatiquement vers la décomposition en Epic avec Feature Teams parallèles.
    En cas d'escalade, ne pas écrire de code — juste [ESCALATE: epic-decompose] + 1 phrase
    expliquant pourquoi.
    Sinon : définir OBLIGATOIREMENT pour chaque feature :
    1. PERSONA : qui utilise ce feature (nom, rôle, besoin concret) — pas "casual user"
    2. USER STORIES : "[US-xxxxxx] En tant que [persona], je veux [action] afin de [bénéfice]"
    3. ACCEPTANCE CRITERIA testables : "[AC-yyyyyy] GIVEN <ctx> WHEN <action> THEN <result>"
    4. DEFINITION OF DONE : build Docker OK + tests E2E passent + screenshots capturés
    All user stories and acceptance criteria MUST have unique UUID references (US-xxxxxx, AC-yyyyyy).
    Sans ces 4 éléments, la phase n'est pas terminée.
  gate: always
  config:
    agents:
    - system-architect-art
    - lead_frontend
    - lead_backend
    dynamic_lead: true
- id: ux-design-review
  pattern_id: sequential
  name: UX Design Review
  description: >
    UX designer reviews the feature design brief and enriches acceptance criteria with
    cognitive science constraints (Laws of UX). This phase DOES NOT redesign the feature —
    it ADDS measurable UX acceptance criteria to each user story produced in feature-design.

    MANDATORY outputs for each user story:
    1. RESPONSE TIME: "[AC-yyyyyy] GIVEN <action> THEN visual feedback within Xms"
       - Instant (<100ms): no indicator; Fast (100–400ms): subtle spinner; Slow (>400ms): skeleton/progress
    2. COGNITIVE LOAD: "[AC-yyyyyy] GIVEN the screen THEN only one primary action is available"
    3. DECISION COMPLEXITY: "[AC-yyyyyy] GIVEN N choices THEN primary options ≤7; recommended option highlighted"
    4. MEMORY DEMAND: "[AC-yyyyyy] GIVEN multi-step flow THEN user never needs to memorize info between steps"
    5. OFFLINE/NETWORK: "[AC-yyyyyy] GIVEN offline state THEN empathic message shown (not technical error)"
       Required only for features with network calls.

    ALSO CHECK AND FLAG (must fix before tdd-sprint):
    - Touch targets: minimum 44×44px (flag if smaller)
    - Fitts's Law: primary CTA near natural cursor/thumb path
    - Peak-End Rule: confirm the happy-path ending is designed (not just "Request submitted")
    - Jakob's Law: verify design follows established conventions for this feature type
    - Von Restorff: exactly ONE visually distinct CTA per screen (no competing highlights)

    OUTPUT FORMAT:
    For each US from feature-design: add [AC-UX-yyyyyy] lines.
    Close with: "UX Gate: PASS" or "UX Gate: FAIL — [list issues]"
    If FAIL, the story-decomposition phase must not start until issues are resolved.

    USE SKILL: ux-laws (all 30 laws, CONTEXT A AC patterns, CONTEXT D mobile/network patterns)
  gate: always
  config:
    agents:
    - ux_designer
- id: story-decomposition
  pattern_id: fractal-stories
  name: Fractal Story Decomposition
  description: >
    MANDATORY deep decomposition of the feature into atomic sub-stories.
    Uses recursive fractal pattern: Vision → Epic → Feature → Story (max depth 3).
    Each leaf story must be:
    - Single responsibility (one module, one component, one function group)
    - Independently implementable and testable
    - Tagged with UUID: [US-xxxxxx] or [FEAT-xxxxxx]
    - Linked to parent feature via lineage chain
    Output: tree of atomic stories ready for parallel implementation.
    DEEP RESEARCH: call deep_search for each major component to understand
    framework APIs, best practices, and reference implementations.
  gate: always
  config:
    agents:
    - system-architect-art
    - product_manager
- id: qa-decomposition
  pattern_id: fractal-qa
  name: Fractal QA Scenarios
  description: >
    Decompose each atomic story from previous phase into Gherkin acceptance tests.
    Each test scenario MUST:
    - Reference the story it validates: [AC-yyyyyy] for [US-xxxxxx]
    - Be in Given/When/Then format
    - Be independently executable
    - Cover happy path + at least one edge case
    Output: atomic BDD scenarios ready for TDD implementation.
  gate: always
  config:
    agents:
    - qa_lead
    - system-architect-art
- id: env-setup
  pattern_id: sequential
  name: Environment Setup & Toolchain Provision
  description: >
    INFRA PROVISION — DevOps reads the brief and detects the required tech stack.
    STEP 1 — STACK DETECTION: Analyze brief, specs, and any existing files to identify:
      • Language: Rust/Swift/Go/Python/Node/Java/Kotlin/C++
      • Frameworks: SpriteKit/SwiftUI/React/Angular/Axum/Spring etc.
      • Build tools: cargo/swift build/npm/gradle/maven/go build
      • Runtime deps: databases, message queues, external APIs
    STEP 2 — DOCKERFILE WITH TOOLCHAIN: Write Dockerfile that INSTALLS the detected stack:
      • Swift → use swift:latest or swiftlang/swift:nightly-main-jammy
      • Rust → use rust:latest (NOT 1.77)
      • Node → use node:20+
      • Go → use golang:1.22+
      • Java → use eclipse-temurin:21-jdk
      • Python → use python:3.12-slim
      • Multi-language → multi-stage build with all needed toolchains
    STEP 3 — DEPENDENCY INSTALL: In Dockerfile, install project deps:
      • Package.swift → swift package resolve
      • Cargo.toml → cargo fetch
      • package.json → npm ci
      • requirements.txt → pip install
    STEP 4 — BUILD VERIFY: Call docker_deploy(cwd=workspace, mission_id=...) to verify:
      • Docker build succeeds (toolchain installed, deps resolved)
      • Compilation passes (swift build / cargo build / npm run build)
      • If docker_deploy FAILS → read error, fix Dockerfile/deps, retry
    BLOQUANT: tdd-sprint does NOT start until docker_deploy returns OK.
    NEVER skip toolchain installation. A generic python:3.12-slim Dockerfile for a Swift
    project is WRONG — detect the actual stack and install the right toolchain.
  gate: always
  config:
    agents:
    - ft-infra-lead
- id: tdd-sprint
  pattern_id: loop
  name: TDD Sprint
  description: 'Devs implémentent en TDD. RED→GREEN→REFACTOR. FRACTAL: feature/guards/failures.'
  gate: no_veto
  config:
    agents: []
    max_iterations: 3
    dynamic_team: true
- id: adversarial-review
  pattern_id: sequential
  name: Adversarial Review
  description: L0 fast checks → L1 code critic → L2 architecture critic. Multi-vendor cascade.
  gate: all_approved
  config:
    agents:
    - system-architect-art
    dynamic_reviewers: true
- id: feature-e2e
  pattern_id: parallel
  name: Tests E2E
  description: >
    Tests E2E API + IHM en parallèle. Smoke + journeys complets.
    OBLIGATOIRE — AVANT tout test Playwright, appeler docker_deploy(cwd=workspace, mission_id=...)
    pour démarrer le container projet et obtenir l'URL (ex: http://127.0.0.1:9100).
    Utiliser CETTE URL dans tous les tests (pas localhost:8080 en dur).
    Vérifier que docker_deploy retourne OK et une URL valide avant de lancer playwright_test.
    Si docker_deploy échoue, signaler VETO avec les logs d'erreur — ne pas lancer les tests.
    Après les tests, prendre des screenshots avec screenshot(url=...) pour documenter les journeys.
    Un résultat {"status":"failed","failedTests":[]} signifie que le serveur n'était PAS démarré
    — c'est un ÉCHEC, pas un succès. Toujours vérifier status="passed" ET failedTests=[].
  gate: all_approved
  config:
    agents:
    - ft-e2e-api
    - ft-e2e-ihm
    max_iterations: 2
- id: feature-deploy
  pattern_id: sequential
  name: Deploy Feature
  description: Build → Staging → Canary. Rollback auto si erreur.
  gate: no_veto
  config:
    agents:
    - ft-infra-lead
    dynamic_deployer: true
