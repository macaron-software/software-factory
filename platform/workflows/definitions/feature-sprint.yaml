id: feature-sprint
name: Feature Sprint — TDD Cycle
description: Workflow réutilisable pour chaque Feature d'un Epic. Design → TDD Sprint → Adversarial Review → E2E Tests → Deploy.
  Utilisé par chaque Feature Team dans le cadre d'un epic-decompose.
icon: repeat
is_builtin: true
phases:
- id: feature-design
  pattern_id: aggregator
  name: Feature Design
  description: >
    Lead + Archi analysent le brief et DÉCIDENT du workflow adapté.
    RÈGLE CRITIQUE — avant tout design, évaluer la complexité :
    • Si le brief décrit UNE fonction / UN endpoint / UN module simple (< 5 fichiers estimés)
      → continuer en feature-sprint normalement.
    • Si le brief décrit UN système complet (auth, API multi-routes, CRUD, microservice, etc.)
      → émettre exactement [ESCALATE: epic-decompose] dans la réponse pour basculer
        automatiquement vers la décomposition en Epic avec Feature Teams parallèles.
    En cas d'escalade, ne pas écrire de code — juste [ESCALATE: epic-decompose] + 1 phrase
    expliquant pourquoi.
    Sinon : définir stories, acceptance criteria, interfaces.
  gate: always
  config:
    agents:
    - system-architect-art
    dynamic_lead: true
- id: env-setup
  pattern_id: sequential
  name: Environment Setup
  description: >
    DevOps lit le brief et détecte la stack technique (Rust/Node/Python/Go/etc.).
    Écrit Dockerfile + docker-compose si besoin. Lance build() pour vérifier que
    l'environnement compile à blanc (hello-world ou cargo check / npm install / go build).
    BLOQUANT : la phase tdd-sprint ne démarre pas tant que build() ne retourne pas SUCCESS.
  gate: always
  config:
    agents:
    - ft-infra-lead
- id: tdd-sprint
  pattern_id: loop
  name: TDD Sprint
  description: 'Devs implémentent en TDD. RED→GREEN→REFACTOR. FRACTAL: feature/guards/failures.'
  gate: no_veto
  config:
    agents: []
    max_iterations: 3
    dynamic_team: true
- id: adversarial-review
  pattern_id: sequential
  name: Adversarial Review
  description: L0 fast checks → L1 code critic → L2 architecture critic. Multi-vendor cascade.
  gate: all_approved
  config:
    agents:
    - system-architect-art
    dynamic_reviewers: true
- id: feature-e2e
  pattern_id: parallel
  name: Tests E2E
  description: Tests E2E API + IHM en parallèle. Smoke + journeys.
  gate: all_approved
  config:
    agents:
    - ft-e2e-api
    - ft-e2e-ihm
    max_iterations: 2
- id: feature-deploy
  pattern_id: sequential
  name: Deploy Feature
  description: Build → Staging → Canary. Rollback auto si erreur.
  gate: no_veto
  config:
    agents:
    - ft-infra-lead
    dynamic_deployer: true
