<!-- Ref: feat-lean-ux -->
<!-- Command Palette — Cmd+K quick search/action overlay -->
<dialog id="cmdPalette" class="cmd-palette" onclick="if(event.target===this)this.close()">
  <div class="cmd-palette-inner">
    <div class="cmd-palette-search">
      <svg class="cmd-palette-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="cmdInput" class="cmd-palette-input" placeholder="Search missions, agents, or type a command..." autocomplete="off" autofocus
             oninput="cmdSearch(this.value)">
      <kbd class="cmd-palette-kbd">ESC</kbd>
    </div>
    <div id="cmdResults" class="cmd-palette-results">
      <div class="cmd-palette-group">
        <div class="cmd-palette-group-label">Quick Actions</div>
        <a class="cmd-palette-item" href="/sessions" data-cmd="chat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> New Chat Session</a>
        <a class="cmd-palette-item" href="/pi" data-cmd="mission"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10"/></svg> Launch Mission</a>
        <a class="cmd-palette-item" href="/agents" data-cmd="agents"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg> Browse Agents</a>
        <a class="cmd-palette-item" href="/projects" data-cmd="projects"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg> Projects</a>
      </div>
    </div>
  </div>
</dialog>

<style>
.cmd-palette { border: none; background: none; padding: 0; max-width: 580px; width: 90vw; margin: 15vh auto; border-radius: var(--radius-xl); }
.cmd-palette::backdrop { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
.cmd-palette-inner { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-xl); overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
.cmd-palette-search { display: flex; align-items: center; padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); gap: 0.5rem; }
.cmd-palette-icon { width: 16px; height: 16px; color: var(--text-secondary); flex-shrink: 0; }
.cmd-palette-input { flex: 1; background: none; border: none; color: var(--text-primary); font-size: var(--text-lg); outline: none; }
.cmd-palette-input::placeholder { color: var(--text-secondary); opacity: 0.6; }
.cmd-palette-kbd { font-size: 0.6rem; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; color: var(--text-secondary); font-family: var(--font-mono); }
.cmd-palette-results { max-height: 50vh; overflow-y: auto; padding: 0.5rem; }
.cmd-palette-group { margin-bottom: 0.5rem; }
.cmd-palette-group-label { font-size: var(--text-xs); font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; padding: 0.4rem 0.6rem 0.2rem; }
.cmd-palette-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 0.6rem; border-radius: 6px; color: var(--text-primary); text-decoration: none; font-size: var(--text-md); cursor: pointer; transition: background 0.1s; }
.cmd-palette-item:hover, .cmd-palette-item.active { background: var(--purple-deep); color: #fff; }
.cmd-palette-item svg { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.7; }
.cmd-palette-item--mission { border-left: 2px solid var(--purple); margin-left: 0.3rem; }
.cmd-palette-item--agent { border-left: 2px solid var(--green); margin-left: 0.3rem; }
.cmd-palette-empty { padding: 1.5rem; text-align: center; color: var(--text-secondary); font-size: var(--text-sm); }
</style>

<script>
// Cmd+K to open
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    const d = document.getElementById('cmdPalette');
    if (d.open) { d.close(); } else { d.showModal(); document.getElementById('cmdInput').focus(); }
  }
  if (e.key === 'Escape' && document.getElementById('cmdPalette').open) {
    document.getElementById('cmdPalette').close();
  }
});

let _cmdDebounce = null;
function cmdSearch(query) {
  clearTimeout(_cmdDebounce);
  if (!query || query.length < 2) {
    // Show default quick actions
    document.getElementById('cmdResults').innerHTML = document.getElementById('cmdResults').dataset.default || '';
    return;
  }
  _cmdDebounce = setTimeout(() => {
    fetch('/api/pulse/search?q=' + encodeURIComponent(query))
      .then(r => r.text())
      .then(html => { document.getElementById('cmdResults').innerHTML = html; });
  }, 200);
}

// Store default content on load
document.addEventListener('DOMContentLoaded', () => {
  const r = document.getElementById('cmdResults');
  if (r) r.dataset.default = r.innerHTML;
});
</script>
