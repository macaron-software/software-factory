<!-- Ref: feat-metrics -->
{% extends "base.html" %}
{% block scripts %}
<script src="/static/js/chart.umd.min.js"></script>
{% endblock %}
{% block content %}
<style>
.metrics-tabs {
    display: flex; gap: 0; margin-bottom: 1.5rem;
    border-bottom: 2px solid var(--border);
    padding: 0 1rem;
}
.metrics-tab {
    padding: 0.6rem 1.25rem; cursor: pointer;
    font-size: 0.85rem; font-weight: 500;
    color: var(--text-secondary); border-bottom: 2px solid transparent;
    margin-bottom: -2px; display: flex; align-items: center; gap: 0.4rem;
    transition: all 0.15s;
    background: none; border: none; border-bottom: 2px solid transparent;
}
.metrics-tab:hover { color: var(--text-primary); }
.metrics-tab.active {
    color: var(--purple-light, #a78bfa);
    border-bottom-color: var(--purple-light, #a78bfa);
    font-weight: 600;
}
.metrics-tab svg.icon { width: 14px; height: 14px; }
</style>

<div class="metrics-tabs">
    <button class="metrics-tab" data-tab="dora"
            hx-get="/metrics/tab/dora" hx-target="#metrics-content" hx-swap="innerHTML" hx-trigger="click">
        <svg class="icon"><use href="#icon-chart"/></svg> DORA
    </button>
    <button class="metrics-tab" data-tab="quality"
            hx-get="/metrics/tab/quality" hx-target="#metrics-content" hx-swap="innerHTML" hx-trigger="click">
        <svg class="icon"><use href="#icon-check-circle"/></svg> Quality
    </button>
    <button class="metrics-tab" data-tab="analytics"
            hx-get="/metrics/tab/analytics" hx-target="#metrics-content" hx-swap="innerHTML" hx-trigger="click">
        <svg class="icon"><use href="#icon-bar-chart-2"/></svg> Analytics
    </button>
    <button class="metrics-tab" data-tab="monitoring"
            hx-get="/metrics/tab/monitoring" hx-target="#metrics-content" hx-swap="innerHTML" hx-trigger="click">
        <svg class="icon"><use href="#icon-activity"/></svg> Monitoring
    </button>
    <button class="metrics-tab" data-tab="pipeline"
            hx-get="/metrics/tab/pipeline" hx-target="#metrics-content" hx-swap="innerHTML" hx-trigger="click">
        <svg class="icon"><use href="#icon-git-branch"/></svg> Pipeline
    </button>
    <button class="metrics-tab" data-tab="knowledge"
            hx-get="/metrics/tab/knowledge" hx-target="#metrics-content" hx-swap="innerHTML" hx-trigger="click">
        <svg class="icon"><use href="#icon-database"/></svg> Knowledge
    </button>
    <button class="metrics-tab" data-tab="llm"
            hx-get="/metrics/tab/llm" hx-target="#metrics-content" hx-swap="innerHTML" hx-trigger="click">
        <svg class="icon"><use href="#icon-cpu"/></svg> LLM
    </button>
    <button class="metrics-tab" data-tab="tests"
            hx-get="/metrics/tab/tests" hx-target="#metrics-content" hx-swap="innerHTML" hx-trigger="click">
        <svg class="icon"><use href="#icon-check-circle"/></svg> Tests
    </button>
    <button class="metrics-tab" data-tab="ops"
            hx-get="/metrics/tab/ops" hx-target="#metrics-content" hx-swap="innerHTML" hx-trigger="click">
        <svg class="icon"><use href="#icon-activity"/></svg> Ops
    </button>
    <button class="metrics-tab" data-tab="modules"
            hx-get="/metrics/tab/modules" hx-target="#metrics-content" hx-swap="innerHTML" hx-trigger="click">
        <svg class="icon"><use href="#icon-package"/></svg> Modules
    </button>
</div>

<div id="metrics-content"
    hx-on:htmx:before-swap="if(event.detail.xhr.status >= 400){ event.detail.shouldSwap=false; }">
    <p style="text-align:center;color:var(--text-secondary);padding:3rem">Loading...</p>
</div>

<script>
// Tab switching — set active class after htmx loads content
document.querySelectorAll('.metrics-tab').forEach(tab => {
    tab.addEventListener('htmx:afterRequest', () => {
        document.querySelectorAll('.metrics-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
    });
});

// Graceful error handling: when a tab fails to load (500/network), show retry UI
document.getElementById('metrics-content').addEventListener('htmx:responseError', function(e) {
    const tab = document.querySelector('.metrics-tab.active')?.dataset?.tab || 'this tab';
    document.getElementById('metrics-content').innerHTML =
        `<div style="text-align:center;padding:3rem;color:var(--text-secondary)">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5" style="margin-bottom:1rem"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <p style="margin:0 0 0.5rem;font-weight:600;color:var(--text-primary)">Failed to load ${tab}</p>
            <p style="margin:0 0 1.5rem;font-size:0.85rem">Server error (${e.detail.xhr?.status || 'network'}). The platform may be restarting.</p>
            <button onclick="htmx.trigger(document.querySelector('.metrics-tab.active'),'click')"
                style="padding:6px 18px;background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.4);color:#a78bfa;border-radius:6px;cursor:pointer;font-size:0.85rem">
                ↻ Retry
            </button>
        </div>`;
});
document.getElementById('metrics-content').addEventListener('htmx:sendError', function() {
    document.getElementById('metrics-content').innerHTML =
        `<div style="text-align:center;padding:3rem;color:var(--text-secondary)">
            <p style="color:var(--text-primary);font-weight:600">Network error — cannot reach server</p>
            <button onclick="htmx.trigger(document.querySelector('.metrics-tab.active'),'click')"
                style="margin-top:1rem;padding:6px 18px;background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.4);color:#a78bfa;border-radius:6px;cursor:pointer;font-size:0.85rem">
                ↻ Retry
            </button>
        </div>`;
});

// Auto-load tab from URL param or default to dora
document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const tab = params.get('tab') || 'dora';
    const target = document.querySelector(`.metrics-tab[data-tab="${tab}"]`) || document.querySelector('.metrics-tab');
    if (target) htmx.trigger(target, 'click');
});
</script>
{% endblock %}
