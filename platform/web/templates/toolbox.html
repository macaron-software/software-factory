// CLI Terminal functions
function handleCLIInput(event) {
    const input = event.target;
    const command = input.value.trim();
    
    // Enter key - execute command
    if (event.key === 'Enter' && command) {
        window.cliHistory.push(command);
        window.cliHistoryIndex = window.cliHistory.length;
        executeCLICommand(command);
        input.value = '';
    }
    
    // Up arrow - previous command
    if (event.key === 'ArrowUp') {
        event.preventDefault();
        if (window.cliHistoryIndex > 0) {
            window.cliHistoryIndex--;
            input.value = window.cliHistory[window.cliHistoryIndex];
        }
    }
    
    // Down arrow - next command
    if (event.key === 'ArrowDown') {
        event.preventDefault();
        if (window.cliHistoryIndex < window.cliHistory.length - 1) {
            window.cliHistoryIndex++;
            input.value = window.cliHistory[window.cliHistoryIndex];
        } else {
            window.cliHistoryIndex = window.cliHistory.length;
            input.value = '';
        }
    }
    
    // Tab - autocomplete
    if (event.key === 'Tab') {
        event.preventDefault();
        const sfCommands = [
            'help', 'clear', 'ideation',
            'platform status',
            'missions list', 'missions show',
            'agents list', 'agents show',
            'workflows list', 'workflows show',
            'patterns list', 'patterns show',
            'memory search', 'memory project', 'memory global',
            'skills sync', 'skills search',
            'projects list',
            'db status',
            'make', 'git', 'python3', 'ruff', 'pytest', 'ls', 'pwd', 'whoami'
        ];
        const partial = input.value.toLowerCase();
        const match = sfCommands.find(cmd => cmd.startsWith(partial));
        if (match) {
            input.value = match + (match.includes(' ') ? '' : ' ');
        }
    }
}

async function executeCLICommand(commandLine) {
    const terminal = document.getElementById('cli-terminal');
    
    // Echo command
    const cmdEcho = document.createElement('div');
    cmdEcho.style.color = '#4ec9b0';
    cmdEcho.style.marginTop = '0.8rem';
    cmdEcho.textContent = `sf$ ${commandLine}`;
    terminal.appendChild(cmdEcho);
    
    // Parse command and args
    const parts = commandLine.split(/\s+/);
    const command = parts[0];
    const args = parts.slice(1);
    
    // Handle built-in commands
    if (command === 'clear') {
        clearTerminal();
        return;
    }
    
    if (command === 'help') {
        showCLIHelp();
        return;
    }
    
    if (command === 'ideation') {
        // Check if prompt provided
        const prompt = args.join(' ').trim();
        if (!prompt) {
            const outputDiv = document.createElement('div');
            outputDiv.style.marginLeft = '1rem';
            outputDiv.style.marginTop = '0.5rem';
            outputDiv.innerHTML = `
                <div style="color:#f48771;margin-bottom:0.5rem">Error: Prompt required</div>
                <div style="color:#d4d4d4;margin-bottom:0.5rem">Usage: <span style="color:#4ec9b0">ideation "your prompt"</span></div>
                <div style="color:#858585;font-size:12px">Example: ideation "créer une app de suivi GPS vélo IoT"</div>
            `;
            terminal.appendChild(outputDiv);
            return;
        }
        
        // Show starting message
        const startDiv = document.createElement('div');
        startDiv.style.marginLeft = '1rem';
        startDiv.style.marginTop = '0.5rem';
        startDiv.style.color = '#dcdcaa';
        startDiv.textContent = 'Starting ideation session...';
        terminal.appendChild(startDiv);
        terminal.scrollTop = terminal.scrollHeight;
        
        // Launch ideation with streaming
        runIdeation(prompt);
        return;
    }
    
    // Detect SF native commands vs system commands
    const sfCommands = ['platform', 'missions', 'agents', 'workflows', 'patterns', 'memory', 'skills', 'projects', 'db'];
    const isSFCommand = sfCommands.includes(command);
    
    // Show loading
    const loadingDiv = document.createElement('div');
    loadingDiv.style.color = '#858585';
    loadingDiv.style.marginLeft = '1rem';
    loadingDiv.textContent = 'Executing...';
    terminal.appendChild(loadingDiv);
    terminal.scrollTop = terminal.scrollHeight;
    
    try {
        let response, data;
        
        if (isSFCommand) {
            // Use SF commands API
            response = await fetch('/api/sf/execute', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    command: commandLine,
                    args: []
                })
            });
            data = await response.json();
        } else {
            // Use generic CLI API
            response = await fetch('/api/cli/execute', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command, args })
            });
            data = await response.json();
        }
        
        terminal.removeChild(loadingDiv);
        
        const outputDiv = document.createElement('div');
        outputDiv.style.marginLeft = '1rem';
        outputDiv.style.whiteSpace = 'pre-wrap';
        outputDiv.style.wordBreak = 'break-word';
        
        if (data.success) {
            outputDiv.style.color = '#d4d4d4';
            outputDiv.textContent = data.output || 'Command executed successfully';
        } else {
            outputDiv.style.color = '#f48771';
            outputDiv.innerHTML = `<strong>Error${data.exit_code ? ' (exit '+data.exit_code+')' : ''}:</strong>\n${data.error || 'Unknown error'}`;
            
            // Report CLI errors to TMA
            try {
                fetch('/api/tma/js-error', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        message: `CLI Error: ${command} ${args.join(' ')}`,
                        source: 'web-cli',
                        error: data.error || 'Unknown error',
                        command: commandLine,
                        url: location.href
                    })
                });
            } catch(_) {}
        }
        
        terminal.appendChild(outputDiv);
    } catch (error) {
        terminal.removeChild(loadingDiv);
        const errorDiv = document.createElement('div');
        errorDiv.style.marginLeft = '1rem';
        errorDiv.style.color = '#f48771';
        errorDiv.textContent = `Error: ${error.message}`;
        terminal.appendChild(errorDiv);
    }
    
    terminal.scrollTop = terminal.scrollHeight;
}

// Run ideation with streaming
async function runIdeation(prompt) {
    const terminal = document.getElementById('cli-terminal');
    
    try {
        // Start ideation
        const response = await fetch('/api/ideation', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt })
        });
        
        if (!response.ok) {
            const error = await response.json();
            const errorDiv = document.createElement('div');
            errorDiv.style.marginLeft = '1rem';
            errorDiv.style.color = '#f48771';
            errorDiv.textContent = `Error: ${error.error || 'Failed to start ideation'}`;
            terminal.appendChild(errorDiv);
            terminal.scrollTop = terminal.scrollHeight;
            return;
        }
        
        const data = await response.json();
        const sessionId = data.session_id;
        const sseUrl = data.sse_url;
        
        // Show session info
        const infoDiv = document.createElement('div');
        infoDiv.style.marginLeft = '1rem';
        infoDiv.style.marginTop = '0.5rem';
        infoDiv.style.color = '#4ec9b0';
        infoDiv.textContent = `Session ${sessionId} started. Connecting to agents...`;
        terminal.appendChild(infoDiv);
        terminal.scrollTop = terminal.scrollHeight;
        
        // Container for streaming output
        const outputDiv = document.createElement('div');
        outputDiv.style.marginLeft = '1rem';
        outputDiv.style.marginTop = '0.5rem';
        outputDiv.style.color = '#d4d4d4';
        outputDiv.style.fontFamily = 'monospace';
        outputDiv.style.whiteSpace = 'pre-wrap';
        outputDiv.style.lineHeight = '1.6';
        terminal.appendChild(outputDiv);
        
        // Connect to SSE
        const eventSource = new EventSource(sseUrl);
        let currentAgent = null;
        
        eventSource.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                
                // Agent started
                if (msg.from_agent && msg.from_agent !== currentAgent) {
                    currentAgent = msg.from_agent;
                    const agentDiv = document.createElement('div');
                    agentDiv.style.marginTop = '1rem';
                    agentDiv.style.color = '#dcdcaa';
                    agentDiv.style.fontWeight = '600';
                    agentDiv.textContent = `[${currentAgent}]`;
                    outputDiv.appendChild(agentDiv);
                }
                
                // Message content
                if (msg.content) {
                    const contentDiv = document.createElement('div');
                    contentDiv.style.marginLeft = '1rem';
                    contentDiv.style.color = '#d4d4d4';
                    contentDiv.textContent = msg.content;
                    outputDiv.appendChild(contentDiv);
                }
                
                // Session completed
                if (msg.message_type === 'system' && msg.content?.includes('completed')) {
                    eventSource.close();
                    const doneDiv = document.createElement('div');
                    doneDiv.style.marginTop = '1rem';
                    doneDiv.style.color = '#4ec9b0';
                    doneDiv.textContent = 'Ideation completed!';
                    outputDiv.appendChild(doneDiv);
                }
                
                terminal.scrollTop = terminal.scrollHeight;
            } catch (e) {
                console.error('SSE parse error:', e);
            }
        };
        
        eventSource.onerror = (error) => {
            console.error('SSE error:', error);
            eventSource.close();
            const errorDiv = document.createElement('div');
            errorDiv.style.marginTop = '0.5rem';
            errorDiv.style.color = '#f48771';
            errorDiv.textContent = 'Connection lost. Ideation may still be running in background.';
            outputDiv.appendChild(errorDiv);
            terminal.scrollTop = terminal.scrollHeight;
        };
        
    } catch (error) {
        const errorDiv = document.createElement('div');
        errorDiv.style.marginLeft = '1rem';
        errorDiv.style.color = '#f48771';
        errorDiv.textContent = `Error: ${error.message}`;
        terminal.appendChild(errorDiv);
        terminal.scrollTop = terminal.scrollHeight;
    }
}

function _loadSwaggerUI() {
    const container = document.getElementById('swagger-ui-container');
    if (!container) return;

    // Inject Swagger UI CSS + JS from unpkg (already in CSP allowlist)
    if (!document.getElementById('swagger-css')) {
        const link = document.createElement('link');
        link.id = 'swagger-css';
        link.rel = 'stylesheet';
        link.href = 'https://unpkg.com/swagger-ui-dist@5/swagger-ui.css';
        document.head.appendChild(link);
    }

    // Dark-mode overrides so it fits the SF theme
    if (!document.getElementById('swagger-dark')) {
        const style = document.createElement('style');
        style.id = 'swagger-dark';
        style.textContent = `
            #swagger-ui-container .swagger-ui { background: var(--bg-primary, #0f0f1a); color: var(--text-primary, #e2e8f0); }
            #swagger-ui-container .swagger-ui .opblock-summary-description,
            #swagger-ui-container .swagger-ui table thead tr th,
            #swagger-ui-container .swagger-ui .info .title,
            #swagger-ui-container .swagger-ui .info p { color: var(--text-primary, #e2e8f0); }
            #swagger-ui-container .swagger-ui .opblock { background: var(--bg-secondary, #1a1a2e); border-color: var(--border, #2d2d45); margin-bottom: 8px; border-radius: 6px; }
            #swagger-ui-container .swagger-ui .opblock .opblock-summary { border-color: var(--border, #2d2d45); }
            #swagger-ui-container .swagger-ui .btn { border-radius: 4px; }
            #swagger-ui-container .swagger-ui input[type=text], #swagger-ui-container .swagger-ui textarea { background: var(--bg-tertiary, #1e2030); color: var(--text-primary, #e2e8f0); border-color: var(--border, #2d2d45); }
            #swagger-ui-container .swagger-ui .topbar { display: none; }
        `;
        document.head.appendChild(style);
    }

    if (window.SwaggerUIBundle) {
        _initSwagger();
        return;
    }

    const script = document.createElement('script');
    script.src = 'https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js';
    script.onload = _initSwagger;
    script.onerror = () => {
        container.innerHTML = '<p style="padding:2rem;color:var(--text-secondary)">Failed to load Swagger UI. <a href="/docs" target="_blank">Open /docs directly</a>.</p>';
    };
    document.head.appendChild(script);
}

function _initSwagger() {
    window.SwaggerUIBundle({
        url: '/openapi.json',
        dom_id: '#swagger-ui-container',
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
        layout: 'BaseLayout',
        deepLinking: false,
        displayRequestDuration: true,
        defaultModelsExpandDepth: 0,
        defaultModelExpandDepth: 0,
        filter: true,
        tryItOutEnabled: true,
    });
}

async function _loadA2ACard() {
    try {
        const r = await fetch('/.well-known/agent.json');
        const d = await r.json();
        document.getElementById('a2a-card-status').textContent = ' Live';
        const caps = document.getElementById('a2a-capabilities');
        if (caps && d.capabilities) {
            caps.innerHTML = d.capabilities.map(c =>
                `<span style="padding:2px 8px;border-radius:12px;background:rgba(124,58,237,.12);color:#a78bfa;font-size:0.72rem;font-weight:600">${c}</span>`
            ).join('');
        }
    } catch(e) {
        const el = document.getElementById('a2a-card-status');
        if (el) { el.textContent = 'unavailable'; el.style.color='#f87171'; el.style.background='rgba(248,113,113,.1)'; }
    }
}

async function a2aSubmitTask() {
    const msg = (document.getElementById('a2a-message').value || '').trim();
    if (!msg) return;
    const tidEl = document.getElementById('a2a-task-id');
    const resEl = document.getElementById('a2a-result');
    const resTxt = document.getElementById('a2a-result-text');
    const resState = document.getElementById('a2a-result-state');

    resEl.style.display = 'block';
    resTxt.textContent = '';
    resState.textContent = 'submitting…';
    resState.style.color = '#fbbf24';

    try {
        const r = await fetch('/a2a/tasks', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({input: {parts: [{kind: 'text', text: msg}]}})
        });
        const task = await r.json();
        if (!task.id) { resTxt.textContent = JSON.stringify(task, null, 2); return; }
        tidEl.textContent = 'task: ' + task.id;
        resState.textContent = 'working…';

        // Stream via SSE
        const evtSrc = new EventSource('/a2a/events?task_id=' + task.id);
        evtSrc.onmessage = (e) => {
            const ev = JSON.parse(e.data);
            if (ev.event === 'task.delta') {
                resTxt.textContent += ev.delta;
            } else if (ev.event === 'task.tool') {
                resTxt.textContent += '\\n[tool: ' + ev.tool + ']\\n';
            } else if (ev.event === 'task.status') {
                resState.textContent = ev.task?.status?.state || 'working';
            } else if (ev.event === 'task.done') {
                evtSrc.close();
                resState.textContent = 'completed';
                resState.style.color = '#22c55e';
                resState.style.background = 'rgba(34,197,94,.12)';
            }
        };
        evtSrc.onerror = () => { evtSrc.close(); resState.textContent = 'error'; resState.style.color='#f87171'; };
    } catch(e) {
        resTxt.textContent = 'Error: ' + e.message;
    }
}
</script>
