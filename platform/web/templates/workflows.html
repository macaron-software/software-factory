<!-- Ref: feat-workflows -->
{% extends "base.html" %}
{% from "partials/skeleton.html" import skeleton_item_grid %}
{% block content %}

<div class="tabs">
    <button class="tab active" hx-get="/workflows/list" hx-target="#tab-content" hx-swap="innerHTML" hx-trigger="click, load" onclick="switchTab(this)">{{ _("templates") }}</button>
    <button class="tab" hx-get="/patterns/list" hx-target="#tab-content" hx-swap="innerHTML" onclick="switchTab(this)">{{ _("patterns_organisationnels") }}</button>

</div>
<div id="tab-content">{{ skeleton_item_grid(6) }}</div>
<template id="sk-workflows">{{ skeleton_item_grid(6) }}</template>
<script>
function switchTab(btn){
    document.querySelectorAll('.tabs .tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-content').innerHTML = document.getElementById('sk-workflows').innerHTML;
}
</script>
{% endblock %}
