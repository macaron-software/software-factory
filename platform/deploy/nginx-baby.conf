# SF-Baby — sf-baby.macaron-software.com → localhost:8093 (baby-ui)
# Install: sudo cp nginx-baby.conf /etc/nginx/sites-enabled/sf-baby.macaron-software.com
# Then: sudo nginx -t && sudo systemctl reload nginx
server {
    server_name sf-baby.macaron-software.com;

    client_max_body_size 100M;

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Maintenance page
    proxy_intercept_errors on;
    error_page 502 =503 @maintenance;
    error_page 503 =503 @maintenance;
    error_page 504 =503 @maintenance;
    location @maintenance {
        default_type text/html;
        add_header Retry-After 10;
        return 503 '<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta http-equiv="refresh" content="8;url=/"><meta name="viewport" content="width=device-width"><title>SF Baby</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0f0a1a;color:#c084fc;font-family:monospace;display:flex;align-items:center;justify-content:center;min-height:100vh}.box{text-align:center;padding:2rem}.logo{font-size:1.4rem;font-weight:700;color:#a855f7;letter-spacing:2px;margin-bottom:2rem}.title{font-size:1.1rem;color:#e2d9f3;margin-bottom:1rem}.sub{color:#6b5b8d;font-size:.85rem;margin-bottom:2rem}.bar{width:200px;height:3px;background:#1a1128;border-radius:2px;margin:1.5rem auto;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#7BA7A7,#E8B87A);border-radius:2px;animation:p 8s linear forwards}@keyframes p{from{width:0}to{width:100%}}</style></head><body><div class="box"><div class="logo">SF BABY</div><div class="title">Updating...</div><div class="sub">Server restarting, please wait.</div><div class="bar"><div class="fill"></div></div></div></body></html>';
    }

    # SSE — no buffering, long timeout
    location /sse/ {
        proxy_pass http://localhost:8093;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_connect_timeout 5s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ /api/sessions/.*/sse$ {
        proxy_pass http://localhost:8093;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_connect_timeout 5s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://localhost:8093;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/sf-baby.macaron-software.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sf-baby.macaron-software.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = sf-baby.macaron-software.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name sf-baby.macaron-software.com;
    return 404;
}
