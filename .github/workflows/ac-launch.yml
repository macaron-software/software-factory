name: AC — Launch & Monitor Cycles

on:
  workflow_dispatch:
    inputs:
      projects:
        description: "Comma-separated project IDs (e.g. ac-hello-html,ac-fullstack-rs)"
        required: false
        default: "ac-hello-html,ac-fullstack-rs"
      action:
        description: "Action to perform"
        required: false
        default: "start-or-resume"
        type: choice
        options:
          - start-or-resume
          - status-only
          - force-restart

jobs:
  ac-launch:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SF_INNOVATION_SSH_KEY }}" | base64 -d > ~/.ssh/id_innovation
          chmod 600 ~/.ssh/id_innovation
          ssh-keyscan -H "${{ secrets.SF_NODE1_IP }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Check & Launch AC cycles on Node 1
        run: |
          ssh -i ~/.ssh/id_innovation -o StrictHostKeyChecking=no \
            sfadmin@${{ secrets.SF_NODE1_IP }} << 'REMOTE'
          set -e
          echo "=== AC Cycle Status ==="
          
          # Detect platform port
          BASE_URL="http://localhost:8091"
          for PORT in 8091 8090 8099 8080 80; do
            RESP=$(curl -sf --max-time 2 "http://localhost:$PORT/api/health" 2>/dev/null)
            if echo "$RESP" | grep -q '"status"'; then
              BASE_URL="http://localhost:$PORT"
              echo "Platform on port $PORT"
              break
            fi
          done
          echo "Using: $BASE_URL"
          
          # JWT login with admin credentials
          API_KEY=""
          LOGIN_RESP=$(curl -s -X POST "$BASE_URL/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@demo.local","password":"demo-admin-2026"}' 2>/dev/null || echo "{}")
          JWT=$(echo "$LOGIN_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))" 2>/dev/null || true)
          if [ -n "$JWT" ]; then
            API_KEY="$JWT"
            echo "JWT login: OK"
          else
            # Fallback: try MACARON_API_KEY from process env
            PLATFORM_PID=$(pgrep -f "uvicorn.*platform" 2>/dev/null | head -1)
            if [ -n "$PLATFORM_PID" ]; then
              MACRO_KEY=$(cat /proc/$PLATFORM_PID/environ 2>/dev/null | tr '\0' '\n' | grep "^MACARON_API_KEY=" | cut -d= -f2- | head -1)
              if [ -n "$MACRO_KEY" ]; then
                API_KEY="$MACRO_KEY"
                echo "Got MACARON_API_KEY from process env"
              fi
            fi
            echo "JWT login: FAILED — ${LOGIN_RESP:0:100}"
          fi
          
          # Helper: curl with JWT bearer, never fails script
          do_api() {
            METHOD="$1"; URL="$2"; shift 2
            if [ -n "$API_KEY" ]; then
              curl -s -X "$METHOD" "$URL" -H "Authorization: Bearer $API_KEY" "$@" 2>/dev/null || true
            else
              curl -s -X "$METHOD" "$URL" "$@" 2>/dev/null || true
            fi
          }
          
          # Check health
          echo ""
          HEALTH=$(curl -sf "$BASE_URL/api/health" 2>/dev/null || echo "{}")
          echo "$HEALTH" | python3 -c "import sys,json; d=json.load(sys.stdin); [print(f'  {c[\"project\"]}: cycle {c[\"cycle\"]} status={c[\"status\"]} updated={c[\"updated_at\"]}') for c in d.get('ac_cycles', [])]" 2>/dev/null || echo "  (health parse error)"
          
          PROJECTS="${{ inputs.projects }}"
          ACTION="${{ inputs.action }}"
          
          IFS=',' read -ra PROJ_LIST <<< "$PROJECTS"
          for PROJECT in "${PROJ_LIST[@]}"; do
            PROJECT=$(echo "$PROJECT" | tr -d ' ')
            echo ""
            echo "=== Processing: $PROJECT ==="
            
            # Get current project status
            STATUS=$(do_api GET "$BASE_URL/api/improvement/projects" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); p=[x for x in d.get('projects',[]) if x['id']=='$PROJECT']; print(p[0]['status'] if p else 'unknown')" 2>/dev/null || echo "unknown")
            echo "  Current status: $STATUS"
            
            if [ "$ACTION" = "status-only" ]; then
              continue
            fi
            
            # Start or resume based on status
            if [ "$STATUS" = "idle" ] || [ "$STATUS" = "completed" ] || [ "$STATUS" = "unknown" ] || [ "$ACTION" = "force-restart" ]; then
              echo "  Starting cycle for $PROJECT..."
              RESP=$(do_api POST "$BASE_URL/api/improvement/start/$PROJECT" \
                -H "Content-Type: application/json" -d '{}')
              echo "  Response: $RESP"
            elif [ "$STATUS" = "paused" ] || [ "$STATUS" = "running" ]; then
              echo "  Resuming/injecting cycle for $PROJECT..."
              RESP=$(do_api POST "$BASE_URL/api/improvement/inject-cycle/$PROJECT" \
                -H "Content-Type: application/json" -d '{}')
              echo "  Inject response: $RESP"
            fi
          done
          
          echo ""
          echo "=== Final Status ==="
          curl -sf "$BASE_URL/api/health" 2>/dev/null | \
            python3 -c "import sys,json; d=json.load(sys.stdin); [print(f'  {c[\"project\"]}: cycle {c[\"cycle\"]} status={c[\"status\"]} updated={c[\"updated_at\"]}') for c in d.get('ac_cycles', [])]" 2>/dev/null || echo "  (could not parse)"
          
          REMOTE
