name: AC — Launch & Monitor Cycles

on:
  workflow_dispatch:
    inputs:
      projects:
        description: "Comma-separated project IDs (e.g. ac-hello-html,ac-fullstack-rs)"
        required: false
        default: "ac-hello-html,ac-fullstack-rs"
      action:
        description: "Action to perform"
        required: false
        default: "start-or-resume"
        type: choice
        options:
          - start-or-resume
          - status-only
          - force-restart

jobs:
  ac-launch:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SF_INNOVATION_SSH_KEY }}" | base64 -d > ~/.ssh/id_innovation
          chmod 600 ~/.ssh/id_innovation
          ssh-keyscan -H "${{ secrets.SF_NODE1_IP }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Check & Launch AC cycles on Node 1
        run: |
          ssh -i ~/.ssh/id_innovation -o StrictHostKeyChecking=no \
            sfadmin@${{ secrets.SF_NODE1_IP }} << 'REMOTE'
          set -e
          echo "=== AC Cycle Status ==="
          
          # Detect platform port
          BASE_URL="http://localhost:8091"
          for PORT in 8091 8090 8099 8080 80; do
            RESP=$(curl -sf --max-time 3 "http://localhost:$PORT/api/health" 2>/dev/null || true)
            if echo "$RESP" | grep -q '"status"'; then
              BASE_URL="http://localhost:$PORT"
              echo "Platform on port $PORT"
              break
            fi
          done
          echo "Using: $BASE_URL"
          
          # JWT login — tokens are httponly cookies
          API_KEY=""
          LOGIN_RESP=$(curl -s -X POST "$BASE_URL/api/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@demo.local","password":"demo-admin-2026"}' \
            -c /tmp/sf-cookies.txt 2>/dev/null || echo "{}")
          LOGIN_ERR=$(echo "$LOGIN_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('error',''))" 2>/dev/null || true)
          if [ -z "$LOGIN_ERR" ] && grep -q "access_token" /tmp/sf-cookies.txt 2>/dev/null; then
            echo "JWT login: OK (cookie)"
            AUTH_OPTS="-b /tmp/sf-cookies.txt"
          else
            echo "JWT login: FAILED — $LOGIN_ERR"
            AUTH_OPTS=""
          fi
          
          # Helper: curl with cookie auth, never fails script
          do_api() {
            METHOD="$1"; URL="$2"; shift 2
            curl -s -X "$METHOD" "$URL" $AUTH_OPTS "$@" 2>/dev/null || true
          }
          
          # Check health
          echo ""
          HEALTH=$(curl -sf "$BASE_URL/api/health" 2>/dev/null || echo "{}")
          echo "$HEALTH" | python3 -c "import sys,json; d=json.load(sys.stdin); [print(f'  {c[\"project\"]}: cycle {c[\"cycle\"]} status={c[\"status\"]} updated={c[\"updated_at\"]}') for c in d.get('ac_cycles', [])]" 2>/dev/null || echo "  (health parse error)"
          
          PROJECTS="${{ inputs.projects }}"
          ACTION="${{ inputs.action }}"
          
          IFS=',' read -ra PROJ_LIST <<< "$PROJECTS"
          for PROJECT in "${PROJ_LIST[@]}"; do
            PROJECT=$(echo "$PROJECT" | tr -d ' ')
            echo ""
            echo "=== Processing: $PROJECT ==="
            
            # Get current project status
            STATUS=$(do_api GET "$BASE_URL/api/improvement/projects" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); p=[x for x in d.get('projects',[]) if x['id']=='$PROJECT']; print(p[0]['status'] if p else 'unknown')" 2>/dev/null || echo "unknown")
            echo "  Current status: $STATUS"
            
            if [ "$ACTION" = "status-only" ]; then
              continue
            fi
            
            # Start or resume based on status
            if [ "$STATUS" = "idle" ] || [ "$STATUS" = "completed" ] || [ "$STATUS" = "unknown" ] || [ "$ACTION" = "force-restart" ]; then
              echo "  Starting cycle for $PROJECT..."
              RESP=$(do_api POST "$BASE_URL/api/improvement/start/$PROJECT" \
                -H "Content-Type: application/json" -d '{}')
              echo "  Response: $RESP"
            elif [ "$STATUS" = "paused" ] || [ "$STATUS" = "running" ]; then
              echo "  Resuming/injecting cycle for $PROJECT..."
              RESP=$(do_api POST "$BASE_URL/api/improvement/inject-cycle/$PROJECT" \
                -H "Content-Type: application/json" -d '{}')
              echo "  Inject response: $RESP"
            fi
          done
          
          echo ""
          echo "=== Final Status ==="
          curl -sf "$BASE_URL/api/health" 2>/dev/null | \
            python3 -c "import sys,json; d=json.load(sys.stdin); [print(f'  {c[\"project\"]}: cycle {c[\"cycle\"]} status={c[\"status\"]} updated={c[\"updated_at\"]}') for c in d.get('ac_cycles', [])]" 2>/dev/null || echo "  (could not parse)"
          
          echo ""
          echo "=== DB Diagnostics ==="
          PID=$(pgrep -f "uvicorn.*platform" | head -1 || echo "")
          DB_URL=$(cat /proc/$PID/environ 2>/dev/null | tr '\0' '\n' | grep "^DATABASE_URL=" | cut -d= -f2- | head -1 || true)
          if [ -n "$DB_URL" ]; then
            echo "Recent sessions:"
            psql "$DB_URL" -t -c "SELECT id, LEFT(name,40), status, created_at FROM sessions ORDER BY created_at DESC LIMIT 5;" 2>/dev/null | grep -v "^$" || true
            echo "Epic runs (last 5):"
            psql "$DB_URL" -t -c "SELECT id, session_id, status, started_at FROM epic_runs ORDER BY started_at DESC LIMIT 5;" 2>/dev/null | grep -v "^$" || true
            echo "Latest hello-html session messages:"
            SID=$(psql "$DB_URL" -t -c "SELECT id FROM sessions WHERE name LIKE '%Hello HTML%' ORDER BY created_at DESC LIMIT 1;" 2>/dev/null | tr -d ' \n' || true)
            if [ -n "$SID" ]; then
              psql "$DB_URL" -t -c "SELECT from_agent, LEFT(content,200), message_type FROM messages WHERE session_id='$SID' ORDER BY timestamp LIMIT 5;" 2>/dev/null | grep -v "^$" || true
            fi
            echo "LLM errors (last 10 min):"
            psql "$DB_URL" -t -c "SELECT provider, error_type, created_at FROM llm_errors ORDER BY created_at DESC LIMIT 3;" 2>/dev/null | grep -v "^$" || echo "  (no llm_errors table)"
            echo "AC sessions config check:"
            psql "$DB_URL" -t -c "SELECT id, LEFT(name,30), status, LEFT(config_json,80) FROM sessions WHERE status='interrupted' AND created_at >= NOW() - INTERVAL '24 hours' ORDER BY created_at DESC LIMIT 5;" 2>/dev/null | grep -v "^$" || true
            echo "Active/running sessions:"
            psql "$DB_URL" -t -c "SELECT id, LEFT(name,30), status FROM sessions WHERE status IN ('active','running') ORDER BY created_at DESC LIMIT 5;" 2>/dev/null | grep -v "^$" || true
            echo "AC cycles scores:"
            psql "$DB_URL" -t -c "SELECT project_id, cycle_num, score_moyen, status, LEFT(phases_json::text,200) FROM ac_cycles ORDER BY created_at DESC LIMIT 10;" 2>/dev/null | grep -v "^$" || echo "  (no ac_cycles table or empty)"
            echo "Message count per AC session:"
            psql "$DB_URL" -t -c "SELECT s.id, LEFT(s.name,30), s.status, COUNT(m.id) as msgs FROM sessions s LEFT JOIN messages m ON m.session_id=s.id WHERE s.config_json LIKE '%ac-improvement-cycle%' AND s.created_at >= NOW() - INTERVAL '3 hours' GROUP BY s.id, s.name, s.status ORDER BY s.created_at DESC LIMIT 8;" 2>/dev/null | grep -v "^$" || true
            echo "Latest messages hello-html cycle 10:"
            psql "$DB_URL" -t -c "SELECT from_agent, LEFT(content,150), message_type FROM messages WHERE session_id='7c3947e9' ORDER BY timestamp DESC LIMIT 10;" 2>/dev/null | grep -v "^$" || true
            echo "Workspace paths:"
            psql "$DB_URL" -t -c "SELECT id, workspace_path FROM projects WHERE id IN ('ac-hello-html','ac-fullstack-rs');" 2>/dev/null | grep -v "^$" || true
          fi
          
          echo "=== Docker Containers ==="
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" 2>/dev/null | grep -E "ac-|proj-" || echo "(no AC containers)"
          
          echo "=== Workspace Files ==="
          for WS in /opt/software-factory/workspaces/ac-hello-html /opt/macaron/workspaces/ac-hello-html /home/sfadmin/workspaces/ac-hello-html; do
            if [ -d "$WS" ]; then
              echo "Found: $WS"
              find "$WS" -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" -o -name "*.rs" -o -name "*.svelte" -o -name "Dockerfile" \) 2>/dev/null | head -15
              break
            fi
          done
          
          REMOTE
