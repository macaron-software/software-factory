name: CI

# SECURITY HARDENING (ref: hackerbot-claw campaign, Feb 2026 — aquasecurity/trivy incident)
# - permissions: contents: read — GITHUB_TOKEN minimal scope (no write access)
# - Actions pinned to SHA (not mutable tags) — prevents supply chain via tag mutation
# - No pull_request_target — prevents pwn-request fork attacks
# - No ${{ github.* }} variables in run: steps — prevents context injection

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read  # Minimal — no write access to repo via GITHUB_TOKEN

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies (prefer npm ci, fallback to npm install)
        run: |
          set -e
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint
        run: npm run lint
        continue-on-error: false

      - name: Run tests
        run: npm run test -- --run
        env:
          CI: true

      - name: Build
        run: npm run build

      - name: Archive build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: build
          path: |
            dist
            build
