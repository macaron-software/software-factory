name: Deploy → Azure Prod

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed layers
        id: changes
        run: |
          # Detect if only UI files changed (web/templates, web/static, web/routes)
          # vs factory files (agents, missions, patterns, services, llm, db, a2a, ops)
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "platform/")
          echo "Changed files:"
          echo "$CHANGED"

          UI_ONLY=true
          while IFS= read -r f; do
            # Any non-web platform file → factory must be redeployed
            if echo "$f" | grep -qE '^platform/(agents|missions|patterns|services|llm|db|a2a|ops|memory|generators|skills|tools|config|models|security|sessions|workers|events)'; then
              UI_ONLY=false
              break
            fi
          done <<< "$CHANGED"

          echo "ui_only=$UI_ONLY" >> "$GITHUB_OUTPUT"
          echo "Deploy mode: ui_only=$UI_ONLY"

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.AZURE_IP }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo -e "Host *\n  StrictHostKeyChecking no\n  ConnectTimeout 20\n  ServerAliveInterval 10" >> ~/.ssh/config

      - name: Rsync platform code to VM staging
        run: |
          rsync -az --checksum --delete \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude 'data/' \
            --exclude 'workspaces/' \
            platform/ \
            azureadmin@${{ secrets.AZURE_IP }}:/home/azureadmin/macaron_update/platform/

      - name: Deploy Factory (when factory code changed)
        if: steps.changes.outputs.ui_only == 'false'
        run: |
          ssh azureadmin@${{ secrets.AZURE_IP }} << 'ENDSSH'
          set -e
          COMPOSE=/home/azureadmin/macaron_update/platform/deploy/docker-compose-vm.yml

          # ── Ensure factory slot dir exists ────────────────────────────────
          sudo mkdir -p /opt/macaron/slots/factory
          sudo chown azureadmin:azureadmin /opt/macaron/slots/factory

          # ── Start factory container if not running ────────────────────────
          docker compose --env-file /opt/macaron/.env -f "$COMPOSE" \
            up -d --no-deps platform-factory 2>/dev/null || true
          sleep 2

          # ── Push new factory code via docker cp ───────────────────────────
          FACTORY_CONTAINER=$(docker ps -q --filter "name=deploy-platform-factory" | head -1)
          if [ -n "$FACTORY_CONTAINER" ]; then
            docker cp /home/azureadmin/macaron_update/platform/. \
              "${FACTORY_CONTAINER}:/app/macaron_platform/"
          else
            # First deploy: start container then copy code in
            docker compose --env-file /opt/macaron/.env -f "$COMPOSE" \
              up -d --no-deps platform-factory 2>/dev/null || true
            sleep 5
            FACTORY_CONTAINER=$(docker ps -q --filter "name=deploy-platform-factory" | head -1)
            [ -n "$FACTORY_CONTAINER" ] && docker cp /home/azureadmin/macaron_update/platform/. \
              "${FACTORY_CONTAINER}:/app/macaron_platform/"
          fi

          # ── Restart factory (drains gracefully, < 5s for headless) ──────
          docker compose --env-file /opt/macaron/.env -f "$COMPOSE" \
            restart platform-factory 2>/dev/null || true

          # ── Wait for factory health ────────────────────────────────────────
          echo "Waiting for platform-factory..."
          OK=0
          for i in $(seq 1 20); do
            sleep 3
            FACTORY_CTR=$(docker ps -q --filter "name=deploy-platform-factory" | head -1)
            [ -z "$FACTORY_CTR" ] && continue
            HTTP=$(docker exec "$FACTORY_CTR" \
              curl -sf -o /dev/null -w "%{http_code}" http://localhost:8091/api/health 2>/dev/null || echo 000)
            echo "  [${i}/20] factory health=${HTTP}"
            if [ "$HTTP" = "200" ]; then OK=1; break; fi
          done
          [ "$OK" = "1" ] && echo "platform-factory healthy ✓" || echo "WARNING: factory health check timed out (non-fatal)"
          ENDSSH

      - name: Blue-Green Deploy (UI / web process)
        run: |
          ssh azureadmin@${{ secrets.AZURE_IP }} << 'ENDSSH'
          set -e

          COMPOSE=/home/azureadmin/macaron_update/platform/deploy/docker-compose-vm.yml

          # ── Self-signed cert for default 443 (HTTPS-by-IP → redirect) ─────────
          mkdir -p /home/azureadmin/macaron-nginx-ssl
          if [ ! -f /home/azureadmin/macaron-nginx-ssl/self-signed.crt ]; then
            openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
              -keyout /home/azureadmin/macaron-nginx-ssl/self-signed.key \
              -out /home/azureadmin/macaron-nginx-ssl/self-signed.crt \
              -subj "/CN=4.233.64.30/O=MacaronSoftware" 2>/dev/null
            echo "self-signed cert generated"
          fi

          # ── Init/update nginx conf dir ────────────────────────────────────────
          mkdir -p /home/azureadmin/macaron-nginx-conf
          if [ ! -f /home/azureadmin/macaron-nginx-conf/default.conf ]; then
            cp /home/azureadmin/macaron_update/platform/deploy/nginx-vm.conf \
              /home/azureadmin/macaron-nginx-conf/default.conf
            echo "nginx conf dir initialized"
          else
            # Preserve current active slot, update everything else
            CURRENT_SLOT=$(grep -oE 'platform-(blue|green)' \
              /home/azureadmin/macaron-nginx-conf/default.conf | head -1 || echo "platform-blue")
            cp /home/azureadmin/macaron_update/platform/deploy/nginx-vm.conf \
              /home/azureadmin/macaron-nginx-conf/default.conf
            sed -i "s/platform-blue:8090/${CURRENT_SLOT}:8090/g" \
              /home/azureadmin/macaron-nginx-conf/default.conf
            echo "nginx conf updated (slot preserved: ${CURRENT_SLOT})"
          fi
          # Ensure Redis is running
          docker compose --env-file /opt/macaron/.env -f "$COMPOSE" \
            up -d --no-deps redis 2>/dev/null || true
          # Ensure nginx is up
          docker compose --env-file /opt/macaron/.env -f "$COMPOSE" \
            up -d --no-deps nginx

          # ── Migrate old single-container setup if needed ─────────────────────
          docker stop deploy-platform-1 2>/dev/null || true

          # ── Determine active / inactive slot (ground truth = nginx conf) ───
          ACTIVE=$(grep -oE 'platform-(blue|green)' /home/azureadmin/macaron-nginx-conf/default.conf \
            2>/dev/null | head -1 | sed 's/platform-//' || echo "blue")
          ACTIVE=${ACTIVE:-blue}
          INACTIVE=$([ "$ACTIVE" = "blue" ] && echo "green" || echo "blue")
          echo "=== Blue-Green: $ACTIVE → $INACTIVE ==="

          # ── Start inactive container (--force-recreate picks up env changes) ──
          docker compose --env-file /opt/macaron/.env -f "$COMPOSE" \
            up -d --no-deps --force-recreate platform-${INACTIVE}
          sleep 2

          # Prevent crash-loop while slot dir is empty, stop cleanly
          docker update --restart=no deploy-platform-${INACTIVE}-1 2>/dev/null || true
          docker stop deploy-platform-${INACTIVE}-1 2>/dev/null || true

          # ── Push new code via docker cp (works on stopped containers) ────────
          docker cp /home/azureadmin/macaron_update/platform/. \
            deploy-platform-${INACTIVE}-1:/app/macaron_platform/

          # ── Start with new code ──────────────────────────────────────────────
          docker update --restart=unless-stopped deploy-platform-${INACTIVE}-1 2>/dev/null || true
          docker start deploy-platform-${INACTIVE}-1

          # ── Health check (up to 60s) ─────────────────────────────────────────
          echo "Waiting for platform-${INACTIVE}..."
          OK=0
          for i in $(seq 1 30); do
            sleep 2
            HTTP=$(docker exec deploy-platform-${INACTIVE}-1 \
              curl -sf -o /dev/null -w "%{http_code}" http://localhost:8090/api/health 2>/dev/null || echo 000)
            echo "  [${i}/30] health=${HTTP}"
            if [ "$HTTP" = "200" ]; then OK=1; break; fi
          done
          if [ "$OK" = "0" ]; then
            echo "ABORT: platform-${INACTIVE} unhealthy — rolling back"
            docker stop deploy-platform-${INACTIVE}-1 2>/dev/null || true
            exit 1
          fi
          echo "platform-${INACTIVE} healthy ✓"

          # ── Swap nginx (zero-downtime) ───────────────────────────────────────
          # sed in-place on conf dir file (azureadmin-writable), then reload
          sed -i "s/platform-${ACTIVE}:8090/platform-${INACTIVE}:8090/g" \
            /home/azureadmin/macaron-nginx-conf/default.conf
          docker exec deploy-nginx-1 nginx -t
          docker exec deploy-nginx-1 nginx -s reload
          echo "nginx → $INACTIVE ✓"

          # ── Drain SSE connections (30s) ──────────────────────────────────────
          sleep 30

          # ── Stop old slot ────────────────────────────────────────────────────
          docker compose --env-file /opt/macaron/.env -f "$COMPOSE" \
            stop platform-${ACTIVE} 2>/dev/null || true

          # ── Persist active slot (azureadmin-writable path) ──────────────────
          echo "$INACTIVE" > /home/azureadmin/macaron-active-slot

          # ── Docker cleanup (keep disk healthy) ───────────────────────────────
          docker image prune -f --filter "until=72h" 2>/dev/null || true
          docker builder prune -f 2>/dev/null || true
          docker container prune -f 2>/dev/null || true
          AVAIL=$(df -h / | awk 'NR==2 {print $4}')
          echo "=== Deploy complete: active=$INACTIVE | disk free: $AVAIL ==="
          ENDSSH
