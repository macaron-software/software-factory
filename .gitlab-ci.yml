stages:
  - deploy

# Deploy to Azure prod (sf-node-1) — mirrors GitHub Actions deploy-azure job
#
# Required GitLab CI/CD variables (Settings -> CI/CD -> Variables):
#   SSH_DEPLOY_KEY  -- private key (file, chmod 600) for macaron@AZURE_IP
#   AZURE_IP        -- 52.143.158.19
#   AZURE_USER      -- macaron  (optional, default: macaron)

deploy-azure:
  stage: deploy
  image: alpine
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache openssh-client rsync
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - cp "$SSH_DEPLOY_KEY" ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$AZURE_IP" >> ~/.ssh/known_hosts 2>/dev/null || true
    - echo "${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}:${CI_COMMIT_SHORT_SHA}" > platform/VERSION
  script:
    - |
      AZURE_USER="${AZURE_USER:-macaron}"
      echo "=== Deploying to Azure $AZURE_IP as $AZURE_USER ==="

      rsync -az --checksum \
        --exclude '__pycache__' --exclude '*.pyc' --exclude 'data/' \
        -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
        skills/ \
        ${AZURE_USER}@${AZURE_IP}:/opt/macaron/skills/

      rsync -az --checksum \
        --exclude '__pycache__' --exclude '*.pyc' --exclude 'data/' \
        -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
        platform/ \
        ${AZURE_USER}@${AZURE_IP}:/opt/macaron/platform/

      ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
        ${AZURE_USER}@${AZURE_IP} "
          docker cp /opt/macaron/skills/. deploy-platform-1:/app/skills/ 2>/dev/null \
            && echo 'skills copied to container' || echo 'docker cp skipped'
          sudo systemctl restart sf-platform || true
          echo 'Azure deploy complete'
        "

      echo "=== Azure deploy done ==="
