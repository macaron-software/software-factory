stages:
  - deploy

# Innovation cluster blue-green deploy
# Triggers on commits from Macaron sync (author = macaron-software.com)
#
# Required GitLab CI/CD variables (Settings → CI/CD → Variables):
#   SSH_DEPLOY_KEY  — private key (file type) for sfadmin@node-1 and node-2
#   NODE1_IP        — 52.143.158.19
#   NODE2_IP        — 40.89.174.75

.deploy_node: &deploy_node
  stage: deploy
  image: alpine
  before_script:
    - apk add --no-cache openssh-client rsync
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - cp "$SSH_DEPLOY_KEY" ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - echo "StrictHostKeyChecking no" > ~/.ssh/config
    - |
      # TAG + short SHA for VERSION file
      echo "${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}:${CI_COMMIT_SHORT_SHA}" > platform/VERSION

deploy-node1:
  <<: *deploy_node
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_AUTHOR =~ /macaron-software/'
  script:
    - |
      echo "=== Deploying to node-1 ($NODE1_IP) via jump ($NODE2_IP) ==="
      # node-1 SSH is only accessible via node-2 internal VNet
      PROXY="ssh -W %h:%p -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no sfadmin@${NODE2_IP}"

      rsync -az --checksum --delete \
        --exclude '__pycache__' --exclude '*.pyc' --exclude 'data/' \
        -e "ssh -o ProxyCommand='$PROXY' -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
        platform/ \
        sfadmin@10.0.1.4:/home/sfadmin/platform/

      ssh -o "ProxyCommand=$PROXY" -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
        sfadmin@10.0.1.4 \
        "cd /home/sfadmin && bash deploy.sh"

      echo "=== node-1 deploy complete ==="

deploy-node2:
  <<: *deploy_node
  needs: [deploy-node1]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_AUTHOR =~ /macaron-software/'
  script:
    - |
      echo "=== Deploying to node-2 ($NODE2_IP) ==="

      rsync -az --checksum --delete \
        --exclude '__pycache__' --exclude '*.pyc' --exclude 'data/' \
        -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
        platform/ \
        sfadmin@${NODE2_IP}:/home/sfadmin/platform/

      ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
        sfadmin@${NODE2_IP} \
        "cd /home/sfadmin && bash deploy.sh"

      echo "=== node-2 deploy complete ==="
